# WeightLoRA Hyperparameters Configuration
# This file contains all training hyperparameters for WeightLoRA experiments
# Referenced by: trainers/weightlora_trainer.py, trainers/weightlora_plus_trainer.py, experiments/*.py

# =============================================================================
# GLOBAL HYPERPARAMETERS
# =============================================================================

# Random seed for reproducibility
random_seed: 42

# Number of training epochs
num_epochs: 10

# Batch size per GPU
batch_size: 32

# Gradient accumulation steps (for larger effective batch size)
gradient_accumulation_steps: 1

# Learning rate
learning_rate: 0.0003

# Weight decay for L2 regularization
weight_decay: 0.01

# Warmup ratio (fraction of training steps for warmup)
warmup_ratio: 0.06

# Max gradient norm for clipping
max_grad_norm: 1.0

# Evaluation frequency (every N training steps)
eval_steps: 500

# Logging frequency (every N training steps)
logging_steps: 50

# Save checkpoint frequency (every N training steps)
save_steps: 1000

# =============================================================================
# WEIGHTLoRA SPECIFIC HYPERPARAMETERS
# =============================================================================

# Number of adapters to keep (sparsity level K)
# Values: 1, 5, 10, 20, 50, 100
# Paper Table 2: k=5 achieves 86% parameter reduction
K: 10

# Number of training steps before adapter disconnection (T)
# After T steps, adapters with ω_i ≈ 0 are permanently disconnected
T: 200

# LoRA rank (r)
rank: 8

# LoRA scaling factor (α)
# Default: α = 32.0 (paper recommendation)
alpha: 32.0

# Dropout probability for LoRA adapters
dropout: 0.05

# StoIHT optimizer parameters
stoiht:
  # Initial learning rate for weight vector optimization
  initial_learning_rate: 0.1
  
  # L2 regularization for weight vector
  l2_lambda: 0.001
  
  # Adaptive learning rate decay
  lr_decay: 0.999
  
  # Gradient clipping for stability
  grad_clip: 1.0

# =============================================================================
# WEIGHTLoRA+ SPECIFIC HYPERPARAMETERS
# =============================================================================

# Phase 1 training steps (adapter selection phase)
phase_1_steps: 200

# Rank expansion target (for Phase 2)
rank_expansion: 8

# Phase 2 training steps
phase_2_steps: 800

# =============================================================================
# MODEL-SPECIFIC HYPERPARAMETERS
# =============================================================================

# DeBERTaV3-base configuration
deberta:
  model_name: "microsoft/deberta-v3-base"
  num_labels: 2  # For binary classification tasks
  target_modules:
    - "attention.q_proj"
    - "attention.k_proj"
    - "attention.v_proj"
    - "attention.out_proj"
  # Memory: ~184M params, full LoRA: ~3.2GB adapter memory
  # WeightLoRA k=5: ~0.5GB adapter memory (86% reduction)

