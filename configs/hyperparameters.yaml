# =============================================================================
# TASK-SPECIFIC HYPERPARAMETERS
# =============================================================================

# GLUE tasks configuration
glue:
  max_length: 128
  pad_token_id: 1
  num_labels: 2
  tasks:
    - name: "mnli"
      num_labels: 3
      metric: "accuracy"
    - name: "sst2"
      num_labels: 2
      metric: "accuracy"
    - name: "cola"
      num_labels: 2
      metric: "mcc"
    - name: "qqp"
      num_labels: 2
      metric: "f1"
    - name: "qnli"
      num_labels: 2
      metric: "accuracy"
    - name: "rte"
      num_labels: 2
      metric: "accuracy"
    - name: "mrpc"
      num_labels: 2
      metric: "f1"
    - name: "sts-b"
      num_labels: 1  # Regression task
      metric: "pearson"

# SQuAD configuration
squad:
  max_length: 384
  version: "v2.0"
  metric: "f1"
  # Paper Table 9: SQuAD v2.0 F1 ≥ 0.8234

# NLG (Summarization) configuration
nlg:
  max_length: 256
  tasks:
    - name: "xsum"
      metric: "rouge"
    - name: "cnn_dailymail"
      metric: "rouge"
  # Paper Section 4.3: XSum ROUGE ≥ 0.3674

# =============================================================================
# EXPERIMENT CONFIGURATIONS
# =============================================================================

# Default experiment settings
default_experiment:
  model: "deberta"
  dataset: "glue"
  task: "mnli"
  K: 10
  rank: 8
  alpha: 32.0
  lr: 0.0003
  epochs: 10
  batch_size: 32

# Ablation study configurations
ablation:
  # RLoRA (Random Layer Selection)
  rlo_ra:
    K: 5
    rank: 8
    alpha: 32.0
    seed: 42
  
  # No sparsity control
  no_sparsity:
    K: 100
    rank: 8
    alpha: 32.0
  
  # Different K values
  k_values:
    - 1
    - 5
    - 10
    - 20
    - 50
    - 100

# =============================================================================
# CHECKPOINT SETTINGS
# =============================================================================

checkpoint:
  # Directory for saving checkpoints
  dir: "checkpoints"
  
  # Filename pattern
  filename: "weightlora_{model}_{task}_{K}_{rank}"
  
  # Include weight vector in checkpoint
  include_weight_vector: true
  
  # Include optimizer state
  include_optimizer: true

# =============================================================================
# EVALUATION SETTINGS
# =============================================================================

evaluation:
  # Validation set size (fraction of dataset)
  validation_split: 0.1
  
  # Number of evaluation runs (for statistical significance)
  num_runs: 5
  
  # Random seed for evaluation
  eval_seed: 42
  
  # Metrics to compute
  metrics:
    - "accuracy"
    - "f1"
    - "mcc"
    - "pearson"
    - "rouge-1"
    - "rouge-2"
    - "rouge-l"

# =============================================================================
# MEMORY SETTINGS
# =============================================================================

memory:
  # Expected memory usage (GB)
  expected_memory:
    deberta_full_lora: 3.2
    deberta_weightlora_k5: 0.5
    bart_full_lora: 6.5
    bart_weightlora_k5: 1.1
    llama_full_lora: 6.4
    llama_weightlora_k5: 0.8
  
  # Target reduction percentage
  target_reduction: 0.86  # 86% reduction at k=5
